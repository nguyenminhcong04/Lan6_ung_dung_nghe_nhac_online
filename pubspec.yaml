name: ung_dung_nghe_nhac_online
description: "Ứng dụng nghe nhạc online - Bài tập Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- THƯ VIỆN NHẠC & UI ---
  just_audio: ^0.9.36              # Thư viện phát nhạc chính
  audio_video_progress_bar: ^2.0.1  # Thanh thời lượng nhạc (Progress bar) cực đẹp
  rxdart: ^0.27.7                   # Hỗ trợ xử lý Stream (tối ưu cho Playlist)
  
  # --- UI & FONTS ---
  google_fonts: ^6.1.0              # Giúp app trông hiện đại hơn
  cached_network_image: ^3.3.0      # Load ảnh thumbnail bài hát từ URL và lưu tạm (cache)
  provider: ^6.1.2 # Quản lý trạng thái Sáng/Tối và User  
  shared_preferences: ^2.2.3
  # --- FIREBASE (Cho phần đăng nhập và lưu trữ *) ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0             # Đăng nhập
  cloud_firestore: ^5.0.0           # Lưu metadata bài hát & playlist cá nhân
  firebase_storage: ^12.0.0         # Lưu file mp3 nếu bạn tự upload

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Nếu bạn có dùng ảnh icon app cục bộ, hãy bỏ comment phần này:
  # assets:
  #   - assets/images/logo.png